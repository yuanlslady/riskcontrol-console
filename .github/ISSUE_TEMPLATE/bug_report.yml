name: Bug report
description: Report a bug to help us improve.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈！为了更快定位问题，请尽量提供复现步骤与截图/录屏。
  - type: dropdown
    id: site
    attributes:
      label: 发生在哪个站点？
      options:
        - Demo（riskcontrol-demo.vercel.app）
        - 真实测试（riskcontrol-app.vercel.app）
        - 本地开发（localhost）
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按步骤写清楚“点了什么 → 发生了什么 → 期望什么”。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: 实际结果/报错信息
      description: 如果有控制台报错/网络请求错误，请贴出来或截图。
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      placeholder: |
        OS:
        Browser:
        是否登录:
        Data Source（Demo/Local/Supabase）:
    validations:
      required: false

